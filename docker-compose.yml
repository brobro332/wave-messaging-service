version: '3.8'

services:
  # Wave Messaging 전용 PostgreSQL DB
  wave-db:
    image: kartoza/postgis:15-3.3
    container_name: wave-db
    restart: always
    environment:
      - POSTGRES_USER=datt_user
      - POSTGRES_PASS=datt_password
      - POSTGRES_DB=datt_wave
    ports:
      - "5433:5432"
    volumes:
      - wave-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d datt_wave -U datt_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Wave Messaging 전용 Redis (DB 1번 영역)
  wave-redis:
    image: redis:7-alpine
    container_name: wave-redis
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes

  # Wave Messaging 전용 Kafka (KRaft 모드)
  wave-kafka:
    image: bashj79/kafka-kraft:latest
    container_name: wave-kafka
    restart: always
    ports:
      - "9093:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9093"

volumes:
  wave-db-data:
