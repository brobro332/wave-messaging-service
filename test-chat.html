<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Messaging - Realtime Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 440px; background: #ffffff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-col; height: 90vh; }
        .header { background: #2563eb; color: #fff; padding: 20px; font-weight: 800; font-size: 18px; text-align: center; }
        .form-section { padding: 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        input { padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; outline: none; }
        button { padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f1f5f9; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg.me { align-self: flex-end; background: #2563eb; color: #ffffff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #ffffff; color: #1e293b; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .msg.system { align-self: center; background: #e2e8f0; color: #64748b; font-size: 12px; font-weight: 600; border-radius: 12px; padding: 6px 12px; }
        .input-section { padding: 12px; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; }
        .input-section input { flex: 1; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🌊 Wave Messaging Test</div>
    
    <div class="form-section" id="setupForm">
        <input type="text" id="roomId" value="room_gangnam" placeholder="채팅방 ID (예: room_gangnam)" />
        <input type="text" id="sender" value="유저A" placeholder="내 닉네임" />
        <button onclick="connect()">채팅방 입장하기</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg system">채팅방에 접속해 주세요.</div>
    </div>

    <div class="input-section">
        <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." disabled onkeypress="if(event.keyCode==13) sendMessage()" />
        <button id="sendBtn" onclick="sendMessage()" disabled>전송</button>
    </div>
</div>

<script>
    let stompClient = null;
    let currentRoomId = '';
    let currentSender = '';

    function connect() {
        currentRoomId = document.getElementById("roomId").value.trim();
        currentSender = document.getElementById("sender").value.trim();

        if (!currentRoomId || !currentSender) {
            alert("방 ID와 닉네임을 입력하세요!");
            return;
        }

        const socket = new SockJS('http://localhost:8081/ws-stomp');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            
            document.getElementById("setupForm").style.display = "none";
            document.getElementById("messageInput").disabled = false;
            document.getElementById("sendBtn").disabled = false;

            // STOMP 구독 (/sub/chat/room/{roomId})
            stompClient.subscribe('/sub/chat/room/' + currentRoomId, function (chatMessage) {
                const message = JSON.parse(chatMessage.body);
                showChatMessage(message);
            });

            // 입장 메시지 발행 (/pub/chat/message)
            stompClient.send("/pub/chat/message", {}, JSON.stringify({
                type: 'ENTER',
                roomId: currentRoomId,
                sender: currentSender,
                message: ''
            }));
        }, function (error) {
            alert("웹소켓 연결 실패: " + error);
        });
    }

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const msgText = input.value.trim();

        if (msgText && stompClient) {
            stompClient.send("/pub/chat/message", {}, JSON.stringify({
                type: 'TALK',
                roomId: currentRoomId,
                sender: currentSender,
                message: msgText
            }));
            input.value = '';
        }
    }

    function showChatMessage(msg) {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");

        if (msg.type === 'ENTER' || msg.type === 'LEAVE') {
            div.className = "msg system";
            div.innerText = msg.message;
        } else {
            div.className = "msg " + (msg.sender === currentSender ? "me" : "other");
            div.innerHTML = `<strong>${msg.sender}</strong><br/>${msg.message}`;
        }

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
